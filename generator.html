<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Generated Names</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    <h1>Your Generated Names</h1>

    <textarea id="description"></textarea>

    <button onclick="generateNames()">Generate</button>

    <div id="result"></div>
  </div>

  <script src="generator.js"></script>

  <script>
    // Trae lo que escribió el usuario en index.html
    const saved = localStorage.getItem("desc");
    if (saved) {
      document.getElementById("description").value = saved;
    }
  </script>

</body>
</html>
