<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Name Generator</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<main class="container">

  <h1>Professional Name Generator</h1>
  <p class="subtitle">
    Create powerful names for brands, business, characters, products and social media.
  </p>

  <section class="categories">

    <button class="cat-btn" data-cat="business"><img src="icons/business.svg">Business</button>
    <button class="cat-btn" data-cat="brand"><img src="icons/brand.svg">Brand</button>
    <button class="cat-btn" data-cat="gaming"><img src="icons/gaming.svg">Gaming</button>
    <button class="cat-btn" data-cat="characters"><img src="icons/characters.svg">Fiction Character</button>
    <button class="cat-btn" data-cat="tech"><img src="icons/tech.svg">Tech / Startup</button>
    <button class="cat-btn" data-cat="product"><img src="icons/product.svg">Product</button>
    <button class="cat-btn" data-cat="domain"><img src="icons/domain.svg">Domain</button>
    <button class="cat-btn" data-cat="creative"><img src="icons/creative.svg">Creative</button>
    <button class="cat-btn" data-cat="pet"><img src="icons/pet.svg">Pet Names</button>

    <!-- SOCIAL COMO ÚLTIMA TARJETA DEL GRID -->
    <button id="socialMain" class="cat-btn social-main">
      <img src="icons/social.svg">Social Media
    </button>

  </section>

  <!-- BARRA DE REDES FUERA DEL GRID -->
  <div id="socialBar" class="social-bar">
    <button data-cat="instagram"><img src="icons/instagram.svg"></button>
    <button data-cat="tiktok"><img src="icons/tiktok.svg"></button>
    <button data-cat="youtube"><img src="icons/youtube.svg"></button>
    <button data-cat="twitter"><img src="icons/twitter.svg"></button>
    <button data-cat="facebook"><img src="icons/facebook.svg"></button>
    <button data-cat="deviantart"><img src="icons/deviantart.svg"></button>
    <button data-cat="twitch"><img src="icons/twitch.svg"></button>
    <button data-cat="kick"><img src="icons/kick.svg"></button>
    <button data-cat="username"><img src="icons/user.svg"></button>
  </div>

  <section class="generator">
    <textarea id="description" placeholder="Describe what you need..."></textarea>
    <button id="generateButton">Generate Names</button>
  </section>

  <section id="results" class="results"></section>

</main>

<script src="js/app.js"></script>
</body>
</html>
