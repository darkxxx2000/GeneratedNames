<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Name Generator</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<main class="container">

  <h1>Professional Name Generator</h1>
  <p class="subtitle">
    Create powerful names for brands, business, characters, products and social media.
  </p>

  <!-- ================= CATEGORÍAS ================= -->
  <section class="categories">

    <button class="cat-btn" data-cat="business">
      <img src="https://img.icons8.com/fluency/48/briefcase.png"/>
      Business
    </button>

    <button class="cat-btn" data-cat="brand">
      <img src="https://img.icons8.com/fluency/48/label.png"/>
      Brand
    </button>

    <button class="cat-btn" data-cat="gaming">
      <img src="https://img.icons8.com/fluency/48/controller.png"/>
      Gaming
    </button>

    <button class="cat-btn" data-cat="characters">
      <img src="https://img.icons8.com/fluency/48/wizard.png"/>
      Fiction Characters
    </button>

    <button class="cat-btn" data-cat="tech">
      <img src="https://img.icons8.com/fluency/48/laptop.png"/>
      Tech / Startup
    </button>

    <button class="cat-btn" data-cat="product">
      <img src="https://img.icons8.com/fluency/48/box.png"/>
      Product
    </button>

    <button class="cat-btn" data-cat="domain">
      <img src="https://img.icons8.com/fluency/48/domain.png"/>
      Domain
    </button>

    <button class="cat-btn" data-cat="creative">
      <img src="https://img.icons8.com/fluency/48/idea.png"/>
      Creative
    </button>

    <button class="cat-btn" data-cat="pet">
      <img src="https://img.icons8.com/fluency/48/pet.png"/>
      Pet Names
    </button>

  </section>

  <!-- ================= SOCIAL DORADO ================= -->
  <div class="social-wrapper">
    <button id="socialMain" class="social-main">
      <img src="https://img.icons8.com/fluency/48/share.png"/>
      Social Media Names
    </button>

    <div id="socialBar" class="social-bar">
      <button data-cat="instagram"><img src="https://img.icons8.com/color/48/instagram-new.png"/></button>
      <button data-cat="tiktok"><img src="https://img.icons8.com/color/48/tiktok.png"/></button>
      <button data-cat="youtube"><img src="https://img.icons8.com/color/48/youtube-play.png"/></button>
      <button data-cat="twitter"><img src="https://img.icons8.com/color/48/twitterx.png"/></button>
      <button data-cat="facebook"><img src="https://img.icons8.com/color/48/facebook-new.png"/></button>
      <button data-cat="deviantart"><img src="https://img.icons8.com/color/48/deviantart.png"/></button>
      <button data-cat="twitch"><img src="https://img.icons8.com/color/48/twitch.png"/></button>
      <button data-cat="kick"><img src="https://seeklogo.com/images/K/kick-logo-1E9E1A2C8E-seeklogo.com.png" width="28"/></button>
      <button data-cat="username"><img src="https://img.icons8.com/fluency/48/user.png"/></button>
    </div>
  </div>

  <!-- ================= GENERADOR ================= -->
  <section class="generator">
    <textarea id="description" placeholder="Describe what you need..."></textarea>
    <button id="generateButton">Generate Names</button>
  </section>

  <!-- ================= RESULTADOS ================= -->
  <section id="results" class="results"></section>

  <!-- ================= FOOTER ================= -->
  <footer>
    <a href="uses.html">Uses</a> •
    <a href="privacy.html">Privacy</a> •
    <a href="terms.html">Terms</a> •
    <a href="contact.html">Contact</a>
  </footer>

</main>

<script src="js/app.js"></script>
<script>
  // abrir / cerrar barra social
  const socialMain = document.getElementById("socialMain");
  const socialBar = document.getElementById("socialBar");

  socialMain.addEventListener("click", () => {
    socialBar.style.display =
      socialBar.style.display === "flex" ? "none" : "flex";
  });
</script>

</body>
</html>
