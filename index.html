<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Name Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="hero">

    <h1>Create Unique Names Instantly</h1>
    <p class="subtitle">
      Generate names for characters, cities, brands, objects, stories and more.
    </p>

    <div class="generator-box">
      <textarea id="description"
        placeholder="Describe what you need... e.g: dark fantasy warrior, futuristic city, eco tech brand..."></textarea>

      <button onclick="generateNames()">Generate Names</button>
    </div>

  </div>

  <div class="results-section">
    <h2>Generated Names</h2>
    <div id="result"></div>

    <p class="examples">
      Generate names for:
      Fantasy Characters • Cities • Clothing Brands • Startups • Apps • Objects • Stories • Games • And more
    </p>
  </div>

  <script src="generator.js"></script>

</body>
</html>
