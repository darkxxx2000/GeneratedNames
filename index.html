<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Name Generator</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<main class="container">

  <h1>Professional Name Generator</h1>
  <p class="subtitle">
    Create powerful names for brands, business, characters, products and social media.
  </p>

  <!-- ================= CATEGORÍAS ================= -->
  <section class="categories">

    <button class="cat-btn" data-cat="business">
      <img src="icons/business.svg" alt="">
      Business
    </button>

    <button class="cat-btn" data-cat="brand">
      <img src="icons/brand.svg" alt="">
      Brand
    </button>

    <button class="cat-btn" data-cat="gaming">
      <img src="icons/gaming.svg" alt="">
      Gaming
    </button>

    <button class="cat-btn" data-cat="characters">
      <img src="icons/characters.svg" alt="">
      Fiction Characters
    </button>

    <button class="cat-btn" data-cat="tech">
      <img src="icons/tech.svg" alt="">
      Tech / Startup
    </button>

    <button class="cat-btn" data-cat="product">
      <img src="icons/product.svg" alt="">
      Product
    </button>

    <button class="cat-btn" data-cat="domain">
      <img src="icons/domain.svg" alt="">
      Domain
    </button>

    <button class="cat-btn" data-cat="creative">
      <img src="icons/creative.svg" alt="">
      Creative
    </button>

    <button class="cat-btn" data-cat="pet">
      <img src="icons/pet.svg" alt="">
      Pet Names
    </button>

  </section>

  <!-- ================= SOCIAL DORADO ================= -->
  <div class="social-wrapper">
    <button id="socialMain" class="social-main">
      <img src="icons/social.svg" alt="">
      Social Media Names
    </button>

    <div id="socialBar" class="social-bar">
      <button data-cat="instagram"><img src="icons/instagram.svg" alt=""></button>
      <button data-cat="tiktok"><img src="icons/tiktok.svg" alt=""></button>
      <button data-cat="youtube"><img src="icons/youtube.svg" alt=""></button>
      <button data-cat="twitter"><img src="icons/twitter.svg" alt=""></button>
      <button data-cat="facebook"><img src="icons/facebook.svg" alt=""></button>
      <button data-cat="deviantart"><img src="icons/deviantart.svg" alt=""></button>
      <button data-cat="twitch"><img src="icons/twitch.svg" alt=""></button>
      <button data-cat="kick"><img src="icons/kick.svg" alt=""></button>
      <button data-cat="username"><img src="icons/user.svg" alt=""></button>
    </div>
  </div>

  <!-- ================= GENERADOR ================= -->
  <section class="generator">
    <textarea id="description" placeholder="Describe what you need..."></textarea>
    <button id="generateButton">Generate Names</button>
  </section>

  <!-- ================= RESULTADOS ================= -->
  <section id="results" class="results"></section>

  <!-- ================= FOOTER ================= -->
  <footer>
    <a href="uses.html">Uses</a> •
    <a href="privacy.html">Privacy</a> •
    <a href="terms.html">Terms</a> •
    <a href="contact.html">Contact</a>
  </footer>

</main>

<script src="js/app.js"></script>

<script>
const socialMain = document.getElementById("socialMain");
const socialBar = document.getElementById("socialBar");

socialMain.addEventListener("click", () => {
  socialBar.classList.toggle("show");
});
</script>

</body>
</html>
