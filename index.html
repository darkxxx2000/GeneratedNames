<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Name Generator</title>
<link rel="stylesheet" href="styles.css">

<style>
/* ================= SOCIAL BAR (OCULTA POR DEFECTO) ================= */
.social-bar {
  display: none;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 15px;
  padding: 10px;
}

.social-bar.show {
  display: flex;
}

/* ================= DESCRIPTION BOX 3D ================= */
.generator {
  margin-top: 25px;
}

#description {
  width: 100%;
  min-height: 140px;
  padding: 20px;
  margin-bottom: 15px;

  border-radius: 14px;
  border: 1px solid #2a2a2a;

  background: linear-gradient(145deg, #1a1a1a, #222);

  color: #fff;
  font-size: 14px;
  line-height: 1.5;

  box-shadow:
    8px 8px 16px rgba(0,0,0,0.7),
    -4px -4px 10px rgba(255,255,255,0.05);

  outline: none;
  resize: vertical;
}

/* Optional nicer button spacing */
#generateButton {
  padding: 12px 18px;
  border-radius: 10px;
  cursor: pointer;
}
</style>

</head>
<body>

<main class="container">

  <h1>Professional Name Generator</h1>

  <p class="subtitle">
    Create powerful names for brands, business, characters, products and social media.
  </p>

  <!-- ================= CATEGORIES ================= -->
  <section class="categories">

    <button class="cat-btn" data-cat="business">
      <img src="icons/business.svg" alt="">
      Business
    </button>

    <button class="cat-btn" data-cat="brand">
      <img src="icons/brand.svg" alt="">
      Brand
    </button>

    <button class="cat-btn" data-cat="gaming">
      <img src="icons/gaming.svg" alt="">
      Fiction Characters
    </button>

    <button class="cat-btn" data-cat="tech">
      <img src="icons/tech.svg" alt="">
      Tech / Startup
    </button>

    <button class="cat-btn" data-cat="product">
      <img src="icons/product.svg" alt="">
      Product
    </button>

    <button class="cat-btn" data-cat="domain">
      <img src="icons/domain.svg" alt="">
      Domain
    </button>

    <button class="cat-btn" data-cat="creative">
      <img src="icons/creative.svg" alt="">
      Creative
    </button>

    <button class="cat-btn" data-cat="pet">
      <img src="icons/pet.svg" alt="">
      Pet Names
    </button>

    <!-- SOCIAL MAIN BUTTON -->
    <button id="socialMain" class="cat-btn social-main">
      <img src="icons/social.svg" alt="">
      Social Media Names
    </button>

  </section>

  <!-- ================= SOCIAL BAR ================= -->
  <div id="socialBar" class="social-bar">

    <button data-cat="instagram"><img src="icons/instagram.svg"> Instagram</button>
    <button data-cat="tiktok"><img src="icons/tiktok.svg"> TikTok</button>
    <button data-cat="youtube"><img src="icons/youtube.svg"> YouTube</button>
    <button data-cat="twitter"><img src="icons/twitter.svg"> Twitter / X</button>
    <button data-cat="facebook"><img src="icons/facebook.svg"> Facebook</button>
    <button data-cat="deviantart"><img src="icons/deviantart.svg"> DeviantArt</button>
    <button data-cat="twitch"><img src="icons/twitch.svg"> Twitch</button>
    <button data-cat="kick"><img src="icons/kick.svg"> Kick</button>
    <button data-cat="username"><img src="icons/user.svg"> Username</button>

  </div>

  <!-- ================= GENERATOR ================= -->
  <section class="generator">
    <textarea id="description" placeholder="Describe what you need..."></textarea>
    <button id="generateButton">Generate Names</button>
  </section>

  <!-- ================= RESULTS ================= -->
  <section id="results" class="results"></section>

  <!-- ================= FOOTER ================= -->
  <footer>
    <a href="uses.html">Uses</a> •
    <a href="privacy.html">Privacy</a> •
    <a href="terms.html">Terms</a> •
    <a href="contact.html">Contact</a>
  </footer>

</main>

<script src="js/app.js"></script>

<script>
const socialMain = document.getElementById("socialMain");
const socialBar = document.getElementById("socialBar");

socialMain.addEventListener("click", () => {
  socialBar.classList.toggle("show");
});
</script>

</body>
</html>
