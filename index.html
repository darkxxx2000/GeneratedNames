<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Name Generator</title>
  <link rel="stylesheet" href="styles.css">
<script src="js/app.js"></script>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <h1>Generate Unique Names with AI</h1>
    <p>
      Describe your idea and choose a category. Instantly get creative, brandable,
      and original names.
    </p>
  </section>

  <!-- MAIN CARD -->
  <div class="wrapper">
    <div class="card">

      <textarea
        id="description"
        placeholder="Describe what you need... (brand, fantasy character, app, clan, project, etc)">
      </textarea>

      <!-- CATEGORIES -->
      <div class="categories">
        <button data-cat="brand">Brand</button>
        <button data-cat="fantasy">Fantasy</button>
        <button data-cat="tech">Tech</button>
        <button data-cat="gaming">Gaming</button>
        <button data-cat="random">Random</button>
      </div>

      <button id="generateButton" class="generate-btn">
        ✨ Generate Names
      </button>

    </div>

    <!-- RESULTS -->
    <div id="result" class="results"></div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <a href="privacy.html">Privacy</a> |
    <a href="terms.html">Terms</a> |
    <a href="uses.html">Uses</a> |
    <a href="contact.html">Contact</a>
  </div>

  <script src="js/core.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
