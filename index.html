<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Name Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">

    <h1 class="titulo">AI Name Generator</h1>
    <p class="descripcion">Describe what kind of names you need</p>

    <div class="card">
      <textarea id="description"
        placeholder="Example: names for a fantasy game, tech startup, anime characters...">
      </textarea>

      <button onclick="generateNames()">Generate Names</button>
    </div>

    <div id="result" class="card"></div>

  </div>

  <script src="generator.js"></script>

</body>
</html>
