<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Name Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    <h1>AI Name Generator</h1>
    <p>Describe what kind of names you need</p>

    <textarea id="description" placeholder="Example: names for a fantasy game, tech startup, anime characters..."></textarea>

    <button onclick="goToGenerator()">Generate Names</button>
  </div>

  <script>
    function goToGenerator() {
      const desc = document.getElementById("description").value.trim();
      if (!desc) {
        alert("Please describe what you need.");
        return;
      }
      localStorage.setItem("desc", desc);
      window.location.href = "generator.html";
    }
  </script>

</body>
</html>
