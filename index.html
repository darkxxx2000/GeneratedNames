<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Name Generator</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<main class="container">

  <h1>Professional Name Generator</h1>

  <p class="subtitle">
    Create powerful names for brands, businesses, characters and social media.
  </p>

  <!-- ================= CATEGORIES ================= -->
  <section class="categories">

    <button class="cat-btn" data-cat="tech">Tech</button>
    <button class="cat-btn" data-cat="dark">Dark</button>
    <button class="cat-btn" data-cat="fantasy">Fantasy</button>
    <button class="cat-btn" data-cat="generic">Generic</button>

    <button id="socialMain" class="cat-btn social-main">
      Social Media
    </button>

  </section>

  <!-- ================= SOCIAL BAR ================= -->
  <div id="socialBar" class="social-bar">

    <button data-cat="instagram">Instagram</button>
    <button data-cat="tiktok">TikTok</button>
    <button data-cat="youtube">YouTube</button>
    <button data-cat="twitter">Twitter</button>
    <button data-cat="twitch">Twitch</button>

  </div>

  <!-- ================= INPUT ================= -->
  <section class="generator">
    <textarea id="description" placeholder="Describe what you need..."></textarea>
    <button id="generateButton">Generate Names</button>
  </section>

  <!-- ================= RESULTS ================= -->
  <section id="results" class="results"></section>

  <!-- ================= FOOTER ================= -->
  <footer>
    <a href="uses.html">Uses</a>
    <a href="privacy.html">Privacy</a>
    <a href="terms.html">Terms</a>
    <a href="contact.html">Contact</a>
  </footer>

</main>

<!-- ================= SCRIPTS (ORDER IMPORTANT) ================= -->
<script src="core-engine.js"></script>
<script src="renderer.js"></script>
<script src="app.js"></script>

</body>
</html>
